<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IPTV Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --accent: #8b5cf6;
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #4f46e5);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border-radius: 0.75rem;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.3s;
        }

        .form-group:focus-within .input-icon {
            color: var(--primary);
        }

        .btn-login {
            background: linear-gradient(to right, var(--primary), var(--accent));
            border: none;
            padding: 0.8rem;
            border-radius: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .logo-icon {
            font-size: 3rem;
            background: -webkit-linear-gradient(#fff, #94a3b8);
            background: linear-gradient(#fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            z-index: -1;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
            }
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: white;
        }
    </style>
</head>

<body>

    <div class="particle" style="width: 100px; height: 100px; bottom: -50px; left: 10%; animation-duration: 25s;"></div>
    <div class="particle"
        style="width: 150px; height: 150px; bottom: -100px; right: 20%; animation-duration: 30s; animation-delay: 5s;">
    </div>
    <div class="particle"
        style="width: 50px; height: 50px; bottom: 50%; left: 50%; animation-duration: 40s; animation-delay: 2s;"></div>

    <div class="login-card">
        <div class="text-center mb-5">
            <i class="fa fa-tv logo-icon"></i>
            <h2 class="fw-bold mb-1">Welcome Back</h2>
            <p class="text-white-50 small">Enter your credentials to access the panel</p>
        </div>

        <div id="errorAlert" class="alert alert-error border-0 py-2 small mb-4 rounded-3 d-none">
            <i class="fa fa-exclamation-circle me-2"></i><span id="errorMsg"></span>
        </div>

        <form id="loginForm">
            <div class="mb-4 position-relative form-group">
                <i class="fa fa-user input-icon"></i>
                <input type="text" name="username" id="username" class="form-control" placeholder="Username" required
                    autocomplete="off">
            </div>
            <div class="mb-5 position-relative form-group">
                <i class="fa fa-lock input-icon"></i>
                <input type="password" name="password" id="password" class="form-control" placeholder="Password"
                    required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login" id="submitBtn">
                SIGN IN <i class="fa fa-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="text-center mt-5">
            <small class="text-white-50" style="font-size: 0.75rem;">&copy; 2024 IPTV Panel System</small>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const errorAlert = document.getElementById('errorAlert');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i>SIGNING IN...';
            errorAlert.classList.add('d-none');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/admin/index.html';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorAlert.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = 'SIGN IN <i class="fa fa-arrow-right ms-2"></i>';
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error';
                errorAlert.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = 'SIGN IN <i class="fa fa-arrow-right ms-2"></i>';
            }
        });
    </script>

</body>

</html>
